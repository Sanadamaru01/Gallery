<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>壁に色のあるギャラリー</title>
  <style>
    body { margin: 0; overflow: hidden; }
    canvas { display: block; }
  </style>
</head>
<body>
  <script type="module">
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xf8f8f8);

    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 1.5, 3);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // 壁ごとに色を変えるマテリアル
    const materials = [
      new THREE.MeshBasicMaterial({ color: 0xe0e0e0 }), // right
      new THREE.MeshBasicMaterial({ color: 0xe0e0e0 }), // left
      new THREE.MeshBasicMaterial({ color: 0xffffff }), // top
      new THREE.MeshBasicMaterial({ color: 0xcccccc }), // bottom
      new THREE.MeshBasicMaterial({ color: 0xd0d0d0 }), // front
      new THREE.MeshBasicMaterial({ color: 0xd0d0d0 })  // back
    ];

    const room = new THREE.Mesh(
      new THREE.BoxGeometry(6, 2.5, 6),
      materials
    );
    room.material.forEach(m => m.side = THREE.BackSide);
    scene.add(room);

    const light = new THREE.AmbientLight(0xffffff, 1);
    scene.add(light);

    function animate() {
      requestAnimationFrame(animate);
      renderer.render(scene, camera);
    }

    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
