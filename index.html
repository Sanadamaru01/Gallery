<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D View with Mouse Control</title>
    <style>
        body { margin: 0; overflow: hidden; } /* スクロールバーを非表示にする */
        canvas { display: block; } /* キャンバスが余白を持たないようにする */
    </style>
</head>
<body>
    <script type="module">
        // ここにJavaScriptコードを記述します
        // Three.jsをCDNからインポートする
        import * * as THREE from 'https://unpkg.com/three@0.165.0/build/three.module.js';
        import { OrbitControls } from 'https://unpkg.com/three@0.165.0/examples/jsm/controls/OrbitControls.js';

        // シーン、カメラ、レンダラーのセットアップ
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer();
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // オブジェクトの作成（例：立方体）
        const geometry = new THREE.BoxGeometry(1, 1, 1);
        const material = new THREE.MeshBasicMaterial({ color: 0x00ff00 });
        const cube = new THREE.Mesh(geometry, material);
        scene.add(cube);

        // カメラの位置
        camera.position.z = 5;

        // OrbitControlsの追加 (マウスでの視点操作)
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true; // 滑らかな動き
        controls.dampingFactor = 0.25;
        controls.screenSpacePanning = false;
        controls.maxPolarAngle = Math.PI / 2; // 地面の下に潜り込まないようにする

        // アニメーションループ
        function animate() {
            requestAnimationFrame(animate);

            // 必要であればオブジェクトを回転させるなど
            // cube.rotation.x += 0.01;
            // cube.rotation.y += 0.01;

            controls.update(); // OrbitControlsを更新
            renderer.render(scene, camera);
        }
        animate();

        // ウィンドウのリサイズに対応
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
