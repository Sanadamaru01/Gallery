<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>3Dギャラリー</title>
  <style>
    body { margin: 0; overflow: hidden; }
    canvas { display: block; }
  </style>
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.175.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.175.0/examples/jsm/"
      }
    }
  </script>
</head>
<body>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const GALLERY_WIDTH = 10;
const GALLERY_HEIGHT = 2.5;

const frontWallImages = ['photo1.jpg', 'photo2.jpg'];
const leftWallImages = ['photo3.jpg'];
const rightWallImages = ['photo4.jpg', 'photo5.jpg'];

const scene = new THREE.Scene();
scene.background = new THREE.Color(0xfdf6e3);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, GALLERY_HEIGHT, 1);
camera.lookAt(0, GALLERY_HEIGHT, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.outputEncoding = THREE.sRGBEncoding;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.enableZoom = false;
controls.dampingFactor = 0.1;
controls.rotateSpeed = 0.1;
controls.minPolarAngle = Math.PI / 2;
controls.maxPolarAngle = Math.PI / 2;
controls.target.set(0, GALLERY_HEIGHT, 0);

const ivory = 0xfdf6e3;

const floor = new THREE.Mesh(
  new THREE.PlaneGeometry(GALLERY_WIDTH, GALLERY_WIDTH),
  new THREE.MeshStandardMaterial({ color: ivory })
);
floor.rotation.x = -Math.PI / 2;
scene.add(floor);

const createWall = (width, height, x, y, z, ry) => {
  const wall = new THREE.Mesh(
    new THREE.PlaneGeometry(width, height),
    new THREE.MeshStandardMaterial({ color: ivory })
  );
  wall.position.set(x, y, z);
  wall.rotation.y = ry;
  scene.add(wall);
};

createWall(GALLERY_WIDTH, GALLERY_HEIGHT * 2, 0, GALLERY_HEIGHT, -GALLERY_WIDTH / 2, 0);              // back
createWall(GALLERY_WIDTH, GALLERY_HEIGHT * 2, 0, GALLERY_HEIGHT, GALLERY_WIDTH / 2, Math.PI);         // front
createWall(GALLERY_WIDTH, GALLERY_HEIGHT * 2, -GALLERY_WIDTH / 2, GALLERY_HEIGHT, 0, Math.PI / 2);    // left
createWall(GALLERY_WIDTH, GALLERY_HEIGHT * 2, GALLERY_WIDTH / 2, GALLERY_HEIGHT, 0, -Math.PI / 2);    // right

const ceiling = new THREE.Mesh(
  new THREE.PlaneGeometry(GALLERY_WIDTH, GALLERY_WIDTH),
  new THREE.MeshStandardMaterial({ color: ivory })
);
ceiling.rotation.x = Math.PI / 2;
ceiling.position.y = GALLERY_HEIGHT * 2;
scene.add(ceiling);

const light = new THREE.DirectionalLight(0xffffff, 1.2);
scene.add(light);
scene.add(light.target);
const ambientLight = new THREE.AmbientLight(0x888888, 0.5);
scene.add(ambientLight);

const loader = new THREE.TextureLoader();

function createFrameWithImage(x, y, z, imagePath, rotationY = 0) {
  loader.load(imagePath, (texture) => {
    texture.encoding = THREE.sRGBEncoding;
    const imgWidth = texture.image.width;
    const imgHeight = texture.image.height;
    const aspect = imgHeight / imgWidth;
    const fixedLongSide = 3;

    let frameWidth, frameHeight;
    if (imgWidth >= imgHeight) {
      frameWidth = fixedLongSide;
      frameHeight = fixedLongSide * aspect;
    } else {
      frameHeight = fixedLongSide;
      frameWidth = fixedLongSide / aspect;
    }

    const frame = new THREE.Mesh(
      new THREE.BoxGeometry(frameWidth, frameHeight, 0.05),
      new THREE.MeshStandardMaterial({ color: 0x333333 })
    );
    frame.position.set(x, y, z);
    frame.rotation.y = rotationY;
    scene.add(frame);

    const panel = new THREE.Mesh(
      new THREE.PlaneGeometry(frameWidth * 0.95, frameHeight * 0.95),
      new THREE.MeshBasicMaterial({ map: texture, side: THREE.DoubleSide })
    );
    panel.position.set(x, y, z);
    panel.rotation.y = rotationY;
    panel.translateZ(0.03);
    scene.add(panel);
  });
}

function createImagesOnWall(images, direction) {
  const count = images.length;
  const spacing = GALLERY_WIDTH / count;
  const y = GALLERY_HEIGHT;

  images.forEach((filename, i) => {
    const imagePath = './images/' + filename;
    if (direction === 'front') {
      const x = -GALLERY_WIDTH / 2 + spacing * (i + 0.5);
      const z = GALLERY_WIDTH / 2 - 0.1;
      createFrameWithImage(x, y, z, imagePath, Math.PI);
    } else if (direction === 'left') {
      const z = -GALLERY_WIDTH / 2 + spacing * (i + 0.5);
      const x = -GALLERY_WIDTH / 2 + 0.1;
      createFrameWithImage(x, y, z, imagePath, Math.PI / 2);
    } else if (direction === 'right') {
      const z = -GALLERY_WIDTH / 2 + spacing * (i + 0.5);
      const x = GALLERY_WIDTH / 2 - 0.1;
      createFrameWithImage(x, y, z, imagePath, -Math.PI / 2);
    }
  });
}

createImagesOnWall(frontWallImages, 'front');
createImagesOnWall(leftWallImages, 'left');
createImagesOnWall(rightWallImages, 'right');

// カメラ移動ロジック
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
let moveStart = null;
let moveFrom = new THREE.Vector3();
let moveTo = new THREE.Vector3();
const moveDuration = 0.6;

let isClick = false;
let clickStartTime = 0;
const floorLimit = GALLERY_WIDTH / 2 - 1;

window.addEventListener('mousedown', () => {
  isClick = true;
  clickStartTime = performance.now();
});
window.addEventListener('mousemove', () => {
  if (performance.now() - clickStartTime > 200) isClick = false;
});
window.addEventListener('mouseup', (event) => {
  if (!isClick) return;
  mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);
  const intersects = raycaster.intersectObject(floor);
  if (intersects.length > 0) {
    const clicked = intersects[0].point;
    if (Math.abs(clicked.x) > floorLimit || Math.abs(clicked.z) > floorLimit) return;
    const lookAtPos = new THREE.Vector3(clicked.x, GALLERY_HEIGHT, clicked.z);
    controls.target.copy(lookAtPos);
    const direction = new THREE.Vector3().subVectors(lookAtPos, camera.position).normalize();
    const newCamPos = lookAtPos.clone().addScaledVector(direction, -1);
    newCamPos.y = camera.position.y;
    moveStart = performance.now() / 1000;
    moveFrom.copy(camera.position);
    moveTo.copy(newCamPos);
  }
});

const lightOffset = new THREE.Vector3(0, 10, 7.5);
function animate() {
  requestAnimationFrame(animate);
  controls.update();

  if (moveStart !== null) {
    const now = performance.now() / 1000;
    const elapsed = now - moveStart;
    const t = Math.min(elapsed / moveDuration, 1);
    camera.position.lerpVectors(moveFrom, moveTo, t);
    camera.lookAt(controls.target);
    if (t >= 1) moveStart = null;
  }

  const lightPos = lightOffset.clone();
  camera.localToWorld(lightPos);
  light.position.copy(lightPos);
  light.target.position.copy(controls.target);

  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
