<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>3Dギャラリー</title>
  <style>
    body { margin: 0; overflow: hidden; }
    canvas { display: block; }
  </style>

  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.175.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.175.0/examples/jsm/"
      }
    }
  </script>
</head>
<body>
  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xfdf6e3); // アイボリー

    const camera = new THREE.PerspectiveCamera(
      75, window.innerWidth / window.innerHeight, 0.1, 1000
    );
    camera.position.set(0, 2.5, 5); // 展示パネルの中心と同じ高さ
    camera.lookAt(0, 2.5, 0);       // 視線をギャラリーの中心へ
    camera.zoom = 2; // 最大ズーム
    camera.updateProjectionMatrix(); // ズーム反映

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.enableZoom = false;
    controls.dampingFactor = 0.05;

    // 上下回転制限（視線の上下を固定）
    const centerY = 2.5;
    controls.target.set(0, centerY, 0);
    controls.minPolarAngle = Math.PI / 2;
    controls.maxPolarAngle = Math.PI / 2;

    // 床
    const ivory = 0xfdf6e3;
    const floor = new THREE.Mesh(
      new THREE.PlaneGeometry(10, 10),
      new THREE.MeshStandardMaterial({ color: ivory })
    );
    floor.rotation.x = -Math.PI / 2;
    scene.add(floor);

    // 壁（背面）
    const backWall = new THREE.Mesh(
      new THREE.PlaneGeometry(10, 5),
      new THREE.MeshStandardMaterial({ color: ivory })
    );
    backWall.position.z = -5;
    backWall.position.y = 2.5;
    scene.add(backWall);

    // 左右の壁
    const leftWall = backWall.clone();
    leftWall.rotation.y = Math.PI / 2;
    leftWall.position.set(-5, 2.5, 0);
    scene.add(leftWall);

    const rightWall = backWall.clone();
    rightWall.rotation.y = -Math.PI / 2;
    rightWall.position.set(5, 2.5, 0);
    scene.add(rightWall);

    // 天井
    const ceiling = new THREE.Mesh(
      new THREE.PlaneGeometry(10, 10),
      new THREE.MeshStandardMaterial({ color: ivory })
    );
    ceiling.rotation.x = Math.PI / 2;
    ceiling.position.y = 5;
    scene.add(ceiling);

    // 光源
    const light = new THREE.DirectionalLight(0xffffff, 1);
    light.position.set(5, 10, 7.5);
    scene.add(light);
    
    // ★ 追加：明るさ0.5のアンビエントライト
    const ambientLight = new THREE.AmbientLight(0xffffff, 1.5);
    scene.add(ambientLight);


    // 展示パネル（額縁）
    function createFrame(x, y, z) {
      const frame = new THREE.Mesh(
        new THREE.BoxGeometry(1, 1, 0.05),
        new THREE.MeshStandardMaterial({ color: 0x333333 })
      );
      frame.position.set(x, y, z);
      return frame;
    }

    scene.add(createFrame(-2, 2.5, -4.9));
    scene.add(createFrame(0, 2.5, -4.9));
    scene.add(createFrame(2, 2.5, -4.9));

    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
