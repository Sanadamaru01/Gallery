<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>3Dギャラリー</title>
  <style>
    body { margin: 0; overflow: hidden; }
    canvas { display: block; }
  </style>
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.175.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.175.0/examples/jsm/"
      }
    }
  </script>
</head>
<body>
<script type="module">

// ------------------ 基本設定 ------------------
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const scene = new THREE.Scene();
scene.background = new THREE.Color(0xfdf6e3);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 2.5, 1); // 初期位置：ややBack側
camera.lookAt(0, 2.5, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.outputEncoding = THREE.sRGBEncoding;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.1;
controls.rotateSpeed = 0.1;
controls.enableZoom = false;
controls.minPolarAngle = Math.PI / 2;
controls.maxPolarAngle = Math.PI / 2;
controls.target.set(0, 2.5, 0);

// ------------------ 定数 ------------------
const ivory = 0xfdf6e3;
const GALLERY_WIDTH = 10;
const GALLERY_HEIGHT = 2.5;
const floorSize = 10;
const wallHeight = 5;

const imageFiles = ['photo1.jpg', 'photo2.jpg'];

// ------------------ 床と天井 ------------------
const floor = new THREE.Mesh(
  new THREE.PlaneGeometry(floorSize, floorSize),
  new THREE.MeshStandardMaterial({ color: ivory })
);
floor.rotation.x = -Math.PI / 2;
scene.add(floor);

const ceiling = new THREE.Mesh(
  new THREE.PlaneGeometry(floorSize, floorSize),
  new THREE.MeshStandardMaterial({ color: ivory })
);
ceiling.rotation.x = Math.PI / 2;
ceiling.position.y = wallHeight;
scene.add(ceiling);

// ------------------ 壁（Front / Back / Left / Right） ------------------

// Front（カメラの正面）: +Z方向
const frontWall = new THREE.Mesh(
  new THREE.PlaneGeometry(floorSize, wallHeight),
  new THREE.MeshStandardMaterial({ color: ivory })
);
frontWall.rotation.y = Math.PI;
frontWall.position.set(0, wallHeight / 2, 5);
scene.add(frontWall);

// Back（カメラの後ろ）: -Z方向
const backWall = frontWall.clone();
backWall.rotation.y = 0;
backWall.position.set(0, wallHeight / 2, -5);
scene.add(backWall);

// Left: -X方向
const leftWall = frontWall.clone();
leftWall.rotation.y = Math.PI / 2;
leftWall.position.set(-5, wallHeight / 2, 0);
scene.add(leftWall);

// Right: +X方向
const rightWall = frontWall.clone();
rightWall.rotation.y = -Math.PI / 2;
rightWall.position.set(5, wallHeight / 2, 0);
scene.add(rightWall);

// ------------------ ライティング ------------------
const directionalLight = new THREE.DirectionalLight(0xffffff, 1.2);
scene.add(directionalLight);
scene.add(directionalLight.target);

const ambientLight = new THREE.AmbientLight(0x888888, 0.5);
scene.add(ambientLight);

// ------------------ 画像表示 ------------------
const loader = new THREE.TextureLoader();

function createFrameWithImage(x, y, z, imagePath) {
  loader.load(imagePath, (texture) => {
    texture.encoding = THREE.sRGBEncoding;

    const imgW = texture.image.width;
    const imgH = texture.image.height;
    const aspect = imgH / imgW;
    const fixedLongSide = 3;

    let w, h;
    if (imgW >= imgH) {
      w = fixedLongSide;
      h = fixedLongSide * aspect;
    } else {
      h = fixedLongSide;
      w = fixedLongSide / aspect;
    }

    const frame = new THREE.Mesh(
      new THREE.BoxGeometry(w, h, 0.05),
      new THREE.MeshStandardMaterial({ color: 0x333333 })
    );
    frame.position.set(x, y, z);
    scene.add(frame);

    const panel = new THREE.Mesh(
      new THREE.PlaneGeometry(w * 0.95, h * 0.95),
      new THREE.MeshBasicMaterial({ map: texture, side: THREE.DoubleSide })
    );
    panel.position.set(x, y, z + 0.03);
    scene.add(panel);
  });
}

// Front壁に画像を均等配置
const count = imageFiles.length;
const spacing = GALLERY_WIDTH / count;
imageFiles.forEach((name, i) => {
  const x = -GALLERY_WIDTH / 2 + spacing * (i + 0.5);
  createFrameWithImage(x, GALLERY_HEIGHT, 4.9, './images/' + name);
});

// ------------------ カメラ移動 ------------------
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
let moveStart = null;
let moveFrom = new THREE.Vector3();
let moveTo = new THREE.Vector3();
const moveDuration = 0.6;
let isClick = false;
let clickStartTime = 0;
const floorLimit = floorSize / 2 - 1;

window.addEventListener('mousedown', () => {
  isClick = true;
  clickStartTime = performance.now();
});
window.addEventListener('mousemove', () => {
  if (performance.now() - clickStartTime > 200) isClick = false;
});
window.addEventListener('mouseup', (event) => {
  if (!isClick) return;

  mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);

  const intersects = raycaster.intersectObject(floor);
  if (intersects.length > 0) {
    const p = intersects[0].point;
    if (Math.abs(p.x) > floorLimit || Math.abs(p.z) > floorLimit) return;

    const targetY = controls.target.y;
    controls.target.set(p.x, targetY, p.z);

    const direction = new THREE.Vector3().subVectors(p, camera.position).normalize();
    const newCam = p.clone().addScaledVector(direction, -1);
    newCam.y = camera.position.y;

    moveStart = performance.now() / 1000;
    moveFrom.copy(camera.position);
    moveTo.copy(newCam);
  }
});

// ------------------ アニメーション ------------------
const lightOffset = new THREE.Vector3(0, 10, 7.5);

function animate() {
  requestAnimationFrame(animate);
  controls.update();

  if (moveStart !== null) {
    const now = performance.now() / 1000;
    const t = Math.min((now - moveStart) / moveDuration, 1);
    camera.position.lerpVectors(moveFrom, moveTo, t);
    camera.lookAt(controls.target);
    if (t >= 1) moveStart = null;
  }

  // カメラに追従するライト
  const lightPos = lightOffset.clone();
  camera.localToWorld(lightPos);
  directionalLight.position.copy(lightPos);
  directionalLight.target.position.copy(controls.target);

  renderer.render(scene, camera);
}
animate();

// ------------------ リサイズ対応 ------------------
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
