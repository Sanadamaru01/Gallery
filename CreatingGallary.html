<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>3Dギャラリー</title>
  <style>
    body { margin: 0; overflow: hidden; }
    canvas { display: block; }
  </style>
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.175.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.175.0/examples/jsm/"
      }
    }
  </script>
</head>
<body>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// シーン・カメラ・レンダラー
const scene = new THREE.Scene();
scene.background = new THREE.Color(0xfdf6e3);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 2.5, 1);
camera.lookAt(0, 2.5, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.outputEncoding = THREE.sRGBEncoding;
document.body.appendChild(renderer.domElement);

// 操作
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.enableZoom = false;
controls.dampingFactor = 0.1;
controls.rotateSpeed = 0.1;
controls.minPolarAngle = Math.PI / 2;
controls.maxPolarAngle = Math.PI / 2;
controls.target.set(0, 2.5, 0);

// 光源
const light = new THREE.DirectionalLight(0xffffff, 1.2);
scene.add(light);
scene.add(light.target);
const ambient = new THREE.AmbientLight(0x888888, 0.5);
scene.add(ambient);

// ギャラリーサイズ
const GALLERY_WIDTH = 10;
const GALLERY_HEIGHT = 2.5;
const ivory = 0xfdf6e3;

// 床・壁・天井
const floor = new THREE.Mesh(new THREE.PlaneGeometry(10, 10), new THREE.MeshStandardMaterial({ color: ivory }));
floor.rotation.x = -Math.PI / 2;
scene.add(floor);

const backWall = new THREE.Mesh(new THREE.PlaneGeometry(10, 5), new THREE.MeshStandardMaterial({ color: ivory }));
backWall.position.set(0, 2.5, -5);
scene.add(backWall);

const frontWall = backWall.clone();
frontWall.rotation.y = Math.PI;
frontWall.position.set(0, 2.5, 5);
scene.add(frontWall);

const leftWall = backWall.clone();
leftWall.rotation.y = Math.PI / 2;
leftWall.position.set(-5, 2.5, 0);
scene.add(leftWall);

const rightWall = backWall.clone();
rightWall.rotation.y = -Math.PI / 2;
rightWall.position.set(5, 2.5, 0);
scene.add(rightWall);

const ceiling = new THREE.Mesh(new THREE.PlaneGeometry(10, 10), new THREE.MeshStandardMaterial({ color: ivory }));
ceiling.rotation.x = Math.PI / 2;
ceiling.position.y = 5;
scene.add(ceiling);

// 画像読み込みローダー
const loader = new THREE.TextureLoader();

// ---------- フレーム＋画像作成関数 ----------
function createFrameWithImage(x, y, z, imagePath, rotationY = 0) {
  loader.load(imagePath, (texture) => {
    texture.encoding = THREE.sRGBEncoding;

    const imgW = texture.image.width;
    const imgH = texture.image.height;
    const aspect = imgH / imgW;
    const fixedLongSide = 3;

    let w, h;
    if (imgW >= imgH) {
      w = fixedLongSide;
      h = fixedLongSide * aspect;
    } else {
      h = fixedLongSide;
      w = fixedLongSide / aspect;
    }

    const frame = new THREE.Mesh(
      new THREE.BoxGeometry(w, h, 0.05),
      new THREE.MeshStandardMaterial({ color: 0x333333 })
    );
    frame.position.set(x, y, z);
    frame.rotation.y = rotationY;
    scene.add(frame);

    const panel = new THREE.Mesh(
      new THREE.PlaneGeometry(w * 0.95, h * 0.95),
      new THREE.MeshBasicMaterial({ map: texture, side: THREE.DoubleSide })
    );
    panel.position.set(x, y, z);
    panel.rotation.y = rotationY;
    panel.translateZ(0.03);
    scene.add(panel);
  });
}

// ---------- 壁ごとの画像配置 ----------
function placeImagesOnWall(imagePaths, wallWidth, wallY, wallZ, wallX, rotationY, axis = 'x') {
  const spacing = wallWidth / imagePaths.length;
  imagePaths.forEach((img, i) => {
    const offset = -wallWidth / 2 + spacing * (i + 0.5);
    let x = wallX, z = wallZ;

    if (axis === 'x') x = offset;
    if (axis === 'z') z = offset;

    createFrameWithImage(x, wallY, z, './images/' + img, rotationY);
  });
}

// ---------- 壁ごとの画像ファイル ----------
const imagesFront = ['front1.jpg', 'front2.jpg'];
const imagesBack  = ['back1.jpg', 'back2.jpg'];
const imagesLeft  = ['left1.jpg', 'left2.jpg'];
const imagesRight = ['right1.jpg', 'right2.jpg'];

// ---------- 各壁に画像を貼る ----------
placeImagesOnWall(imagesFront, GALLERY_WIDTH, GALLERY_HEIGHT, 4.9, 0, Math.PI, 'x');         // Front
placeImagesOnWall(imagesBack,  GALLERY_WIDTH, GALLERY_HEIGHT, -4.9, 0, 0, 'x');              // Back
placeImagesOnWall(imagesLeft,  GALLERY_WIDTH, GALLERY_HEIGHT, 0, -4.9, Math.PI / 2, 'z');    // Left
placeImagesOnWall(imagesRight, GALLERY_WIDTH, GALLERY_HEIGHT, 0, 4.9, -Math.PI / 2, 'z');    // Right

// ---------- カメラ移動クリック ----------
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
let moveStart = null;
let moveFrom = new THREE.Vector3();
let moveTo = new THREE.Vector3();
const moveDuration = 0.6;

let isClick = false;
let clickStartTime = 0;
const floorLimit = 4.5;

window.addEventListener('mousedown', () => {
  isClick = true;
  clickStartTime = performance.now();
});
window.addEventListener('mousemove', () => {
  if (performance.now() - clickStartTime > 200) isClick = false;
});
window.addEventListener('mouseup', (event) => {
  if (!isClick) return;
  mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);

  const intersects = raycaster.intersectObject(floor);
  if (intersects.length > 0) {
    const clicked = intersects[0].point;
    if (Math.abs(clicked.x) > floorLimit || Math.abs(clicked.z) > floorLimit) return;

    const lookAtPos = new THREE.Vector3(clicked.x, controls.target.y, clicked.z);
    controls.target.copy(lookAtPos);
    const direction = new THREE.Vector3().subVectors(lookAtPos, camera.position).normalize();
    const newCamPos = lookAtPos.clone().addScaledVector(direction, -1);
    newCamPos.y = camera.position.y;

    moveStart = performance.now() / 1000;
    moveFrom.copy(camera.position);
    moveTo.copy(newCamPos);
  }
});

// ---------- アニメーション ----------
const lightOffset = new THREE.Vector3(0, 10, 7.5);
function animate() {
  requestAnimationFrame(animate);
  controls.update();

  if (moveStart !== null) {
    const now = performance.now() / 1000;
    const elapsed = now - moveStart;
    const t = Math.min(elapsed / moveDuration, 1);
    camera.position.lerpVectors(moveFrom, moveTo, t);
    camera.lookAt(controls.target);
    if (t >= 1) moveStart = null;
  }

  const lightPos = lightOffset.clone();
  camera.localToWorld(lightPos);
  light.position.copy(lightPos);
  light.target.position.copy(controls.target);

  renderer.render(scene, camera);
}
animate();

// ---------- リサイズ対応 ----------
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
