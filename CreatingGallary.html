<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>3Dギャラリー</title>
  <style>
    body { margin: 0; overflow: hidden; }
    canvas { display: block; }
  </style>

  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.175.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.175.0/examples/jsm/"
      }
    }
  </script>
</head>
<body>
  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xfdf6e3); // アイボリー

    const camera = new THREE.PerspectiveCamera(
      75, window.innerWidth / window.innerHeight, 0.1, 1000
    );
    camera.position.set(0, 2.5, 5); // 展示パネルの中心と同じ高さ
    camera.lookAt(0, 2.5, 0);       // 視線をギャラリーの中心へ
    camera.zoom = 2;
    camera.updateProjectionMatrix();

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.enableZoom = false;
    controls.dampingFactor = 0.1;
    controls.rotateSpeed = 0.1;

    // 上下回転制限
    const centerY = 2.5;
    controls.target.set(0, centerY, 0);
    controls.minPolarAngle = Math.PI / 2;
    controls.maxPolarAngle = Math.PI / 2;

    const ivory = 0xfdf6e3;

    const floor = new THREE.Mesh(
      new THREE.PlaneGeometry(10, 10),
      new THREE.MeshStandardMaterial({ color: ivory })
    );
    floor.rotation.x = -Math.PI / 2;
    scene.add(floor);

    const backWall = new THREE.Mesh(
      new THREE.PlaneGeometry(10, 5),
      new THREE.MeshStandardMaterial({ color: ivory })
    );
    backWall.position.z = -5;
    backWall.position.y = 2.5;
    scene.add(backWall);

    const leftWall = backWall.clone();
    leftWall.rotation.y = Math.PI / 2;
    leftWall.position.set(-5, 2.5, 0);
    scene.add(leftWall);

    const rightWall = backWall.clone();
    rightWall.rotation.y = -Math.PI / 2;
    rightWall.position.set(5, 2.5, 0);
    scene.add(rightWall);

    const frontWall = backWall.clone();
    frontWall.rotation.y = Math.PI;
    frontWall.position.set(0, 2.5, 5);
    scene.add(frontWall);

    const ceiling = new THREE.Mesh(
      new THREE.PlaneGeometry(10, 10),
      new THREE.MeshStandardMaterial({ color: ivory })
    );
    ceiling.rotation.x = Math.PI / 2;
    ceiling.position.y = 5;
    scene.add(ceiling);

    // カメラ相対位置でライトを配置
    const light = new THREE.DirectionalLight(0xffffff, 1);
    scene.add(light);

    const lightTarget = new THREE.Object3D();
    scene.add(lightTarget);
    light.target = lightTarget;

    const ambientLight = new THREE.AmbientLight(0xffffff, 1.5);
    scene.add(ambientLight);

    function createFrame(x, y, z) {
      const frame = new THREE.Mesh(
        new THREE.BoxGeometry(1, 1, 0.05),
        new THREE.MeshStandardMaterial({ color: 0x333333 })
      );
      frame.position.set(x, y, z);
      return frame;
    }

    scene.add(createFrame(-2, 2.5, -4.9));
    scene.add(createFrame(0, 2.5, -4.9));
    scene.add(createFrame(2, 2.5, -4.9));

    function animate() {
      requestAnimationFrame(animate);

      // ライトをカメラから見た相対位置に保つ
      const relativeLightPos = new THREE.Vector3(5, 10, 7.5); // 相対オフセット
      const lightPos = camera.position.clone().add(relativeLightPos);
      light.position.copy(lightPos);

      // ライトの向きもカメラの注視点へ
      lightTarget.position.copy(controls.target);

      controls.update();
      renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
