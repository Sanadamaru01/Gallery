<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>カスタムギャラリー</title>
  <style>
    body { margin: 0; overflow: hidden; }
    canvas { display: block; }
  </style>

  <!-- Importmap：CDN経由でモジュール解決 -->
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.175.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.175.0/examples/jsm/"
      }
    }
  </script>
</head>
<body>
  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // シーンと背景色
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xfdf6e3); // アイボリー背景

    // カメラ
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 1.5, 3); // 視点の高さ = 1.5m相当

    // レンダラー
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // ライト（天井中央）
    const directionalLight = new THREE.DirectionalLight(0xffffff, 2);
    directionalLight.position.set(0, 5, 0); // 天井の中心から照らす
    scene.add(directionalLight);

    const ambientLight = new THREE.AmbientLight(0xffffff, 1);
    scene.add(ambientLight);

    // 壁・床・天井の色
    const material = new THREE.MeshStandardMaterial({ color: 0xfdf6e3 }); // アイボリー

    // 床
    const floor = new THREE.Mesh(new THREE.PlaneGeometry(10, 10), material);
    floor.rotation.x = -Math.PI / 2;
    scene.add(floor);

    // 天井
    const ceiling = new THREE.Mesh(new THREE.PlaneGeometry(10, 10), material);
    ceiling.position.y = 3;
    ceiling.rotation.x = Math.PI / 2;
    scene.add(ceiling);

    // 壁（前・後・左・右）
    const wallGeometry = new THREE.PlaneGeometry(10, 3);
    const backWall = new THREE.Mesh(wallGeometry, material);
    backWall.position.z = -5;
    backWall.position.y = 1.5;
    scene.add(backWall);

    const frontWall = new THREE.Mesh(wallGeometry, material);
    frontWall.position.z = 5;
    frontWall.rotation.y = Math.PI;
    frontWall.position.y = 1.5;
    scene.add(frontWall);

    const leftWall = new THREE.Mesh(new THREE.PlaneGeometry(10, 3), material);
    leftWall.rotation.y = Math.PI / 2;
    leftWall.position.x = -5;
    leftWall.position.y = 1.5;
    scene.add(leftWall);

    const rightWall = new THREE.Mesh(new THREE.PlaneGeometry(10, 3), material);
    rightWall.rotation.y = -Math.PI / 2;
    rightWall.position.x = 5;
    rightWall.position.y = 1.5;
    scene.add(rightWall);

    // カメラコントロール
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enablePan = false;            // パン禁止
    controls.enableZoom = false;           // ズーム固定
    controls.enableDamping = true;         // 慣性あり
    controls.dampingFactor = 0.1;          // 慣性速度
    controls.rotateSpeed = 0.3;            // 左右の回転をゆっくりに
    controls.minPolarAngle = Math.PI / 2;  // 上下固定
    controls.maxPolarAngle = Math.PI / 2;

    // アニメーション
    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
    }

    animate();

    // リサイズ対応
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
