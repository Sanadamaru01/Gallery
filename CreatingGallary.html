<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>3Dギャラリー</title>
  <style>
    body { margin: 0; overflow: hidden; }
    canvas { display: block; }
  </style>
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.175.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.175.0/examples/jsm/"
      }
    }
  </script>
</head>
<body>
<script type="module">

import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// === ギャラリーサイズ ===
const WALL_WIDTH = 10;    // 壁の幅（X/Z方向）
const WALL_HEIGHT = 5;    // 壁の高さ
const GALLERY_HEIGHT = 2.5;  // 写真のY中心高さ

// === 画像ファイル ===
const imageFiles = [
  'photo1.jpg', 'photo2.jpg',
  'photo3.jpg', 'photo4.jpg',
  'photo5.jpg', 'photo6.jpg',
  'photo7.jpg', 'photo8.jpg'
];

// === シーン準備 ===
const scene = new THREE.Scene();
scene.background = new THREE.Color(0xfdf6e3);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 2.5, 1);
camera.lookAt(0, 2.5, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.outputEncoding = THREE.sRGBEncoding;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.enableZoom = false;
controls.dampingFactor = 0.1;
controls.rotateSpeed = 0.1;
controls.minPolarAngle = Math.PI / 2;
controls.maxPolarAngle = Math.PI / 2;
controls.target.set(0, 2.5, 0);

const ivory = 0xfdf6e3;

// === 壁と床・天井 ===
function createWall(w, h, color = ivory) {
  return new THREE.Mesh(
    new THREE.PlaneGeometry(w, h),
    new THREE.MeshStandardMaterial({ color })
  );
}

const floor = new THREE.Mesh(
  new THREE.PlaneGeometry(WALL_WIDTH, WALL_WIDTH),
  new THREE.MeshStandardMaterial({ color: ivory })
);
floor.rotation.x = -Math.PI / 2;
scene.add(floor);

const ceiling = createWall(WALL_WIDTH, WALL_WIDTH);
ceiling.rotation.x = Math.PI / 2;
ceiling.position.y = WALL_HEIGHT;
scene.add(ceiling);

const frontWall = createWall(WALL_WIDTH, WALL_HEIGHT);
frontWall.rotation.y = Math.PI;
frontWall.position.z = WALL_WIDTH / 2;
frontWall.position.y = WALL_HEIGHT / 2;
scene.add(frontWall);

const backWall = createWall(WALL_WIDTH, WALL_HEIGHT);
backWall.rotation.y = 0;
backWall.position.z = -WALL_WIDTH / 2;
backWall.position.y = WALL_HEIGHT / 2;
scene.add(backWall);

const leftWall = createWall(WALL_WIDTH, WALL_HEIGHT);
leftWall.rotation.y = Math.PI / 2;
leftWall.position.x = -WALL_WIDTH / 2;
leftWall.position.y = WALL_HEIGHT / 2;
scene.add(leftWall);

const rightWall = createWall(WALL_WIDTH, WALL_HEIGHT);
rightWall.rotation.y = -Math.PI / 2;
rightWall.position.x = WALL_WIDTH / 2;
rightWall.position.y = WALL_HEIGHT / 2;
scene.add(rightWall);

// === ライト ===
const directionalLight = new THREE.DirectionalLight(0xffffff, 1.2);
scene.add(directionalLight);
scene.add(directionalLight.target);

const ambientLight = new THREE.AmbientLight(0x888888, 0.5);
scene.add(ambientLight);

// === 写真配置用 ===
const loader = new THREE.TextureLoader();
let imageIndex = 0;

function addImagesToWall(count, axis, fixedCoord, isFront) {
  const spacing = WALL_WIDTH / (count + 1);
  for (let i = 0; i < count; i++) {
    if (imageIndex >= imageFiles.length) return;

    const file = imageFiles[imageIndex++];
    loader.load('./images/' + file, (texture) => {
      const aspect = texture.image.height / texture.image.width;
      const frameWidth = 2.5;
      const frameHeight = frameWidth * aspect;

      const frame = new THREE.Mesh(
        new THREE.BoxGeometry(frameWidth, frameHeight, 0.05),
        new THREE.MeshStandardMaterial({ color: 0x333333 })
      );
      const panel = new THREE.Mesh(
        new THREE.PlaneGeometry(frameWidth * 0.95, frameHeight * 0.95),
        new THREE.MeshBasicMaterial({ map: texture, side: THREE.DoubleSide })
      );

      let x = 0, z = 0;
      if (axis === 'x') {
        x = -WALL_WIDTH / 2 + spacing * (i + 1);
        z = fixedCoord;
