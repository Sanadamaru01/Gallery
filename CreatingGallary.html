<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>3Dギャラリー</title>
  <style>
    body { margin: 0; overflow: hidden; }
    canvas { display: block; }
  </style>
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.175.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.175.0/examples/jsm/"
      }
    }
  </script>
</head>
<body>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const scene = new THREE.Scene();
scene.background = new THREE.Color(0xfdf6e3);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 2.5, 1);
camera.lookAt(0, 2.5, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.outputEncoding = THREE.sRGBEncoding;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.enableZoom = false;
controls.dampingFactor = 0.1;
controls.rotateSpeed = 0.1;
controls.minPolarAngle = Math.PI / 2;
controls.maxPolarAngle = Math.PI / 2;
controls.target.set(0, 2.5, 0);

const ivory = 0xfdf6e3;

const floor = new THREE.Mesh(
  new THREE.PlaneGeometry(10, 10),
  new THREE.MeshStandardMaterial({ color: ivory })
);
floor.rotation.x = -Math.PI / 2;
scene.add(floor);

const wallMaterial = new THREE.MeshStandardMaterial({ color: ivory });

// Front wall (+Z)
const frontWall = new THREE.Mesh(new THREE.PlaneGeometry(10, 5), wallMaterial);
frontWall.position.set(0, 2.5, 5);
frontWall.rotation.y = Math.PI;
scene.add(frontWall);

// Back wall (−Z)
const backWall = new THREE.Mesh(new THREE.PlaneGeometry(10, 5), wallMaterial);
backWall.position.set(0, 2.5, -5);
scene.add(backWall);

// Left wall (−X)
const leftWall = new THREE.Mesh(new THREE.PlaneGeometry(10, 5), wallMaterial);
leftWall.position.set(-5, 2.5, 0);
leftWall.rotation.y = Math.PI / 2;
scene.add(leftWall);

// Right wall (+X)
const rightWall = new THREE.Mesh(new THREE.PlaneGeometry(10, 5), wallMaterial);
rightWall.position.set(5, 2.5, 0);
rightWall.rotation.y = -Math.PI / 2;
scene.add(rightWall);

const ceiling = new THREE.Mesh(
  new THREE.PlaneGeometry(10, 10),
  wallMaterial
);
ceiling.rotation.x = Math.PI / 2;
ceiling.position.y = 5;
scene.add(ceiling);

const light = new THREE.DirectionalLight(0xffffff, 1.2);
scene.add(light);
scene.add(light.target);

const ambientLight = new THREE.AmbientLight(0x888888, 0.5);
scene.add(ambientLight);

const loader = new THREE.TextureLoader();

// フレームと画像を追加する関数
function createFrameWithImage(x, y, z, imagePath, rotationY = 0) {
  loader.load(imagePath, (texture) => {
    texture.encoding = THREE.sRGBEncoding;
    const imgWidth = texture.image.width;
    const imgHeight = texture.image.height;
    const aspect = imgHeight / imgWidth;
    const fixedLongSide = 3;

    let frameWidth, frameHeight;
    if (imgWidth >= imgHeight) {
      frameWidth = fixedLongSide;
      frameHeight = fixedLongSide * aspect;
    } else {
      frameHeight = fixedLongSide;
      frameWidth = fixedLongSide / aspect;
    }

    const frame = new THREE.Mesh(
      new THREE.BoxGeometry(frameWidth, frameHeight, 0.05),
      new THREE.MeshStandardMaterial({ color: 0x333333 })
    );
    frame.position.set(x, y, z);
    frame.rotation.y = rotationY;
    scene.add(frame);

    const panel = new THREE.Mesh(
      new THREE.PlaneGeometry(frameWidth * 0.95, frameHeight * 0.95),
      new THREE.MeshBasicMaterial({ map: texture, side: THREE.DoubleSide })
    );
    panel.position.set(x, y, z + 0.03 * Math.cos(rotationY));
    panel.rotation.y = rotationY;
    scene.add(panel);
  });
}

// ---------------- 画像の配置 ----------------
const GALLERY_HEIGHT = 2.5;
const wallLength = 10;
const countPerWall = 2;
const spacing = wallLength / countPerWall;

const imagesFront = ['photo1.jpg', 'photo2.jpg'];
const imagesBack  = ['photo3.jpg', 'photo4.jpg'];
const imagesLeft  = ['photo5.jpg', 'photo6.jpg'];
const imagesRight = ['photo7.jpg', 'photo8.jpg'];

imagesFront.forEach((img, i) => {
  const x = -wallLength / 2 + spacing * (i + 0.5);
  createFrameWithImage(x, GALLERY_HEIGHT, 4.9, './images/' + img, Math.PI); // Front: +Z
});
imagesBack.forEach((img, i) => {
  const x = -wallLength / 2 + spacing * (i + 0.5);
  createFrameWithImage(x, GALLERY_HEIGHT, -4.9, './images/' + img, 0); // Back: -Z
});
imagesLeft.forEach((img, i) => {
  const z = -wallLength / 2 + spacing * (i + 0.5);
  createFrameWithImage(-4.9, GALLERY_HEIGHT, z, './images/' + img, Math.PI / 2); // Left: -X
});
imagesRight.forEach((img, i) => {
  const z = -wallLength / 2 + spacing * (i + 0.5);
  createFrameWithImage(4.9, GALLERY_HEIGHT, z, './images/' + img, -Math.PI / 2); // Right: +X
});

// ------------- カメラ移動ロジック -------------
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
let moveStart = null;
let moveFrom = new THREE.Vector3();
let moveTo = new THREE.Vector3();
const moveDuration = 0.6;

let isClick = false;
let clickStartTime = 0;
const floorSize = 10;
const floorLimit = floorSize / 2 - 1;

window.addEventListener('mousedown', () => {
  isClick = true;
  clickStartTime = performance.now();
});
window.addEventListener('mousemove', () => {
  if (performance.now() - clickStartTime > 200) isClick = false;
});
window.addEventListener('mouseup', (event) => {
  if (!isClick) return;
  mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);

  const intersects = raycaster.intersectObject(floor);
  if (intersects.length > 0) {
    const clicked = intersects[0].point;
    if (Math.abs(clicked.x) > floorLimit || Math.abs(clicked.z) > floorLimit) return;

    const currentLookAtY = controls.target.y;
    const lookAtPos = new THREE.Vector3(clicked.x, currentLookAtY, clicked.z);
    controls.target.copy(lookAtPos);

    const direction = new THREE.Vector3().subVectors(lookAtPos, camera.position).normalize();
    const newCamPos = lookAtPos.clone().addScaledVector(direction, -1);
    newCamPos.y = camera.position.y;

    moveStart = performance.now() / 1000;
    moveFrom.copy(camera.position);
    moveTo.copy(newCamPos);
  }
});

const lightOffset = new THREE.Vector3(0, 10, 7.5);

function animate() {
  requestAnimationFrame(animate);
  controls.update();

  if (moveStart !== null) {
    const now = performance.now() / 1000;
    const elapsed = now - moveStart;
    const t = Math.min(elapsed / moveDuration, 1);
    camera.position.lerpVectors(moveFrom, moveTo, t);
    camera.lookAt(controls.target);
    if (t >= 1) moveStart = null;
  }

  const lightPos = lightOffset.clone();
  camera.localToWorld(lightPos);
  light.position.copy(lightPos);
  light.target.position.copy(controls.target);
  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
