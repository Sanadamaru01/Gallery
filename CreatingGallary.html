<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>3Dギャラリー</title>
  <style>
    body { margin: 0; overflow: hidden; }
    canvas { display: block; }
  </style>
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.175.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.175.0/examples/jsm/"
      }
    }
  </script>
</head>
<body>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// 定数：ギャラリー壁の幅（部屋のサイズもこれに連動）
const WALL_WIDTH = 12;
const WALL_HEIGHT = 5;
const IMAGE_HEIGHT_CENTER = 2.5;

// 画像ファイル（6枚：Front・Left・Rightに2枚ずつ）
const imageFiles = [
  'photo1.jpg', 'photo2.jpg', // Front
  'photo3.jpg', 'photo4.jpg', // Right
  'photo5.jpg', 'photo6.jpg', // Left
];

const scene = new THREE.Scene();
scene.background = new THREE.Color(0xfdf6e3);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, IMAGE_HEIGHT_CENTER, WALL_WIDTH / 2 - 1);
camera.lookAt(0, IMAGE_HEIGHT_CENTER, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.outputEncoding = THREE.sRGBEncoding;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.enableZoom = false;
controls.dampingFactor = 0.1;
controls.rotateSpeed = 0.1;
controls.minPolarAngle = Math.PI / 2;
controls.maxPolarAngle = Math.PI / 2;
controls.target.set(0, IMAGE_HEIGHT_CENTER, 0);

// --- 床・壁・天井の作成 ---
const ivory = 0xfdf6e3;

const floor = new THREE.Mesh(
  new THREE.PlaneGeometry(WALL_WIDTH, WALL_WIDTH),
  new THREE.MeshStandardMaterial({ color: ivory })
);
floor.rotation.x = -Math.PI / 2;
scene.add(floor);

function createWall(width, height, rotationY, posX, posZ) {
  const wall = new THREE.Mesh(
    new THREE.PlaneGeometry(width, height),
    new THREE.MeshStandardMaterial({ color: ivory })
  );
  wall.rotation.y = rotationY;
  wall.position.set(posX, height / 2, posZ);
  scene.add(wall);
  return wall;
}

const frontWall = createWall(WALL_WIDTH, WALL_HEIGHT, 0, 0, -WALL_WIDTH / 2);
const rightWall = createWall(WALL_WIDTH, WALL_HEIGHT, Math.PI / 2, WALL_WIDTH / 2, 0);
const backWall = createWall(WALL_WIDTH, WALL_HEIGHT, Math.PI, 0, WALL_WIDTH / 2); // ←画像なし
const leftWall = createWall(WALL_WIDTH, WALL_HEIGHT, -Math.PI / 2, -WALL_WIDTH / 2, 0);

const ceiling = new THREE.Mesh(
  new THREE.PlaneGeometry(WALL_WIDTH, WALL_WIDTH),
  new THREE.MeshStandardMaterial({ color: ivory })
);
ceiling.rotation.x = Math.PI / 2;
ceiling.position.y = WALL_HEIGHT;
scene.add(ceiling);

// --- ライト ---
const light = new THREE.DirectionalLight(0xffffff, 1.2);
scene.add(light);
scene.add(light.target);
const ambientLight = new THREE.AmbientLight(0x888888, 0.5);
scene.add(ambientLight);

// --- 画像読み込み ---
const loader = new THREE.TextureLoader();

// 各壁に画像を貼る
function addImagesToWall(imageList, wall, rotationY, posX, posZ) {
  const count = imageList.length;
  const spacing = WALL_WIDTH / (count + 1);

  imageList.forEach((filename, i) => {
    loader.load('./images/' + filename, (texture) => {
      texture.encoding = THREE.sRGBEncoding;
      const imgW = texture.image.width;
      const imgH = texture.image.height;
      const aspect = imgH / imgW;
      const fixedLongSide = 3;

      let frameW, frameH;
      if (imgW >= imgH) {
        frameW = fixedLongSide;
        frameH = fixedLongSide * aspect;
      } else {
        frameH = fixedLongSide;
        frameW = fixedLongSide / aspect;
      }

      const frame = new THREE.Mesh(
        new THREE.BoxGeometry(frameW, frameH, 0.05),
        new THREE.MeshStandardMaterial({ color: 0x333333 })
      );

      const panel = new THREE.Mesh(
        new THREE.PlaneGeometry(frameW * 0.95, frameH * 0.95),
        new THREE.MeshBasicMaterial({ map: texture, side: THREE.DoubleSide })
      );

      const x = (i + 1) * spacing - WALL_WIDTH / 2;

      let position = new THREE.Vector3();
      if (wall === 'front') {
        position.set(x, IMAGE_HEIGHT_CENTER, -WALL_WIDTH / 2 + 0.05);
      } else if (wall === 'right') {
        position.set(WALL_WIDTH / 2 - 0.05, IMAGE_HEIGHT_CENTER, -x);
      } else if (wall === 'left') {
        position.set(-WALL_WIDTH / 2 + 0.05, IMAGE_HEIGHT_CENTER, x);
      }

      frame.position.copy(position);
      frame.rotation.y = rotationY;
      scene.add(frame);

      panel.position.copy(position);
      panel.rotation.y = rotationY;
      panel.position.z += 0.03 * Math.cos(rotationY);
      panel.position.x += 0.03 * Math.sin(rotationY);
      scene.add(panel);
    });
  });
}

// 正面、右、左の壁に画像追加
addImagesToWall(imageFiles.slice(0, 2), 'front', 0, 0, -WALL_WIDTH / 2);
addImagesToWall(imageFiles.slice(2, 4), 'right', Math.PI / 2, WALL_WIDTH / 2, 0);
addImagesToWall(imageFiles.slice(4, 6), 'left', -Math.PI / 2, -WALL_WIDTH / 2, 0);

// --- カメラ移動ロジック ---
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
let moveStart = null;
let moveFrom = new THREE.Vector3();
let moveTo = new THREE.Vector3();
const moveDuration = 0.6;
let isClick = false;
let clickStartTime = 0;
const floorLimit = WALL_WIDTH / 2 - 1;

window.addEventListener('mousedown', () => {
  isClick = true;
  clickStartTime = performance.now();
});

window.addEventListener('mousemove', () => {
  if (performance.now() - clickStartTime > 200) isClick = false;
});

window.addEventListener('mouseup', (event) => {
  if (!isClick) return;
  mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);
  const intersects = raycaster.intersectObject(floor);
  if (intersects.length > 0) {
    const clicked = intersects[0].point;
    if (Math.abs(clicked.x) > floorLimit || Math.abs(clicked.z) > floorLimit) return;
    const lookAtPos = new THREE.Vector3(clicked.x, controls.target.y, clicked.z);
    controls.target.copy(lookAtPos);
    const direction = new THREE.Vector3().subVectors(lookAtPos, camera.position).normalize();
    const newCamPos = lookAtPos.clone().addScaledVector(direction, -1);
    newCamPos.y = camera.position.y;
    moveStart = performance.now() / 1000;
    moveFrom.copy(camera.position);
    moveTo.copy(newCamPos);
  }
});

// --- アニメーション ---
const lightOffset = new THREE.Vector3(0, 10, 7.5);

function animate() {
  requestAnimationFrame(animate);
  controls.update();

  if (moveStart !== null) {
    const now = performance.now() / 1000;
    const elapsed = now - moveStart;
    const t = Math.min(elapsed / moveDuration, 1);
    camera.position.lerpVectors(moveFrom, moveTo, t);
    camera.lookAt(controls.target);
    if (t >= 1) moveStart = null;
  }

  const lightPos = lightOffset.clone();
  camera.localToWorld(lightPos);
  light.position.copy(lightPos);
  light.target.position.copy(controls.target);

  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
