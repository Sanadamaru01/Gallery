<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>ギャラリー with パネル</title>
  <style>
    body { margin: 0; overflow: hidden; }
    canvas { display: block; }
  </style>

  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.175.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.175.0/examples/jsm/"
      }
    }
  </script>
</head>
<body>
  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xfdf6e3); // アイボリー背景

    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 1.5, 3);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // ライト（天井中央）
    const directionalLight = new THREE.DirectionalLight(0xffffff, 2);
    directionalLight.position.set(0, 5, 0);
    scene.add(directionalLight);

    const ambientLight = new THREE.AmbientLight(0xffffff, 1);
    scene.add(ambientLight);

    const material = new THREE.MeshStandardMaterial({ color: 0xfdf6e3 });

    // 床・天井・壁
    const floor = new THREE.Mesh(new THREE.PlaneGeometry(10, 10), material);
    floor.rotation.x = -Math.PI / 2;
    scene.add(floor);

    const ceiling = new THREE.Mesh(new THREE.PlaneGeometry(10, 10), material);
    ceiling.position.y = 3;
    ceiling.rotation.x = Math.PI / 2;
    scene.add(ceiling);

    const wallMaterial = new THREE.MeshStandardMaterial({ color: 0xfdf6e3 });

    const wallGeometry = new THREE.PlaneGeometry(10, 3);
    const backWall = new THREE.Mesh(wallGeometry, wallMaterial);
    backWall.position.z = -5;
    backWall.position.y = 1.5;
    scene.add(backWall);

    const frontWall = new THREE.Mesh(wallGeometry, wallMaterial);
    frontWall.position.z = 5;
    frontWall.rotation.y = Math.PI;
    frontWall.position.y = 1.5;
    scene.add(frontWall);

    const leftWall = new THREE.Mesh(wallGeometry, wallMaterial);
    leftWall.rotation.y = Math.PI / 2;
    leftWall.position.x = -5;
    leftWall.position.y = 1.5;
    scene.add(leftWall);

    const rightWall = new THREE.Mesh(wallGeometry, wallMaterial);
    rightWall.rotation.y = -Math.PI / 2;
    rightWall.position.x = 5;
    rightWall.position.y = 1.5;
    scene.add(rightWall);

    // === ✅ 正面壁に展示パネルを追加 ===
    const panelMaterial = new THREE.MeshStandardMaterial({ color: 0xffffff });
    const panelGeometry = new THREE.BoxGeometry(1, 1, 0.05);

    const positions = [-2, 0, 2];
    positions.forEach(x => {
      const panel = new THREE.Mesh(panelGeometry, panelMaterial);
      panel.position.set(x, 1.5, 4.95); // 正面壁の手前
      scene.add(panel);
    });

    // コントロール設定
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enablePan = false;
    controls.enableZoom = false;
    controls.enableDamping = true;
    controls.dampingFactor = 0.1;
    controls.rotateSpeed = 0.3;
    controls.minPolarAngle = Math.PI / 2;
    controls.maxPolarAngle = Math.PI / 2;

    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
    }

    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
