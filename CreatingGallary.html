<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>3Dギャラリー</title>
  <style>
    body { margin: 0; overflow: hidden; }
    canvas { display: block; }
  </style>

  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.175.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.175.0/examples/jsm/"
      }
    }
  </script>
</head>
<body>
  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xfdf6e3);

    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 2.5, 5);
    camera.lookAt(0, 2.5, 0);
    camera.zoom = 2;
    camera.updateProjectionMatrix();

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.enableZoom = false;
    controls.dampingFactor = 0.1;
    controls.rotateSpeed = 0.1;

    const centerY = 2.5;
    controls.target.set(0, centerY, 0);
    controls.minPolarAngle = Math.PI / 2;
    controls.maxPolarAngle = Math.PI / 2;

    const ivory = 0xfdf6e3;

    // 床
    const floor = new THREE.Mesh(
      new THREE.PlaneGeometry(10, 10),
      new THREE.MeshStandardMaterial({ color: ivory })
    );
    floor.rotation.x = -Math.PI / 2;
    scene.add(floor);

    // 壁
    const backWall = new THREE.Mesh(
      new THREE.PlaneGeometry(10, 5),
      new THREE.MeshStandardMaterial({ color: ivory })
    );
    backWall.position.set(0, 2.5, -5);
    scene.add(backWall);

    const leftWall = backWall.clone();
    leftWall.rotation.y = Math.PI / 2;
    leftWall.position.set(-5, 2.5, 0);
    scene.add(leftWall);

    const rightWall = backWall.clone();
    rightWall.rotation.y = -Math.PI / 2;
    rightWall.position.set(5, 2.5, 0);
    scene.add(rightWall);

    // 正面の壁
    const frontWall = backWall.clone();
    frontWall.rotation.y = Math.PI;
    frontWall.position.set(0, 2.5, 5);
    scene.add(frontWall);

    // 天井
    const ceiling = new THREE.Mesh(
      new THREE.PlaneGeometry(10, 10),
      new THREE.MeshStandardMaterial({ color: ivory })
    );
    ceiling.rotation.x = Math.PI / 2;
    ceiling.position.y = 5;
    scene.add(ceiling);

    // ライト
    const light = new THREE.DirectionalLight(0xffffff, 1);
    scene.add(light);
    scene.add(light.target);

    const ambientLight = new THREE.AmbientLight(0xffffff, 1.5);
    scene.add(ambientLight);

    // 額縁（枠）作成関数
    function createFrame(x, y, z) {
      const frame = new THREE.Mesh(
        new THREE.BoxGeometry(1, 1, 0.05),
        new THREE.MeshStandardMaterial({ color: 0x333333 })
      );
      frame.position.set(x, y, z);
      return frame;
    }

    // 額縁3つ追加（左・中央・右）
    const frameLeft = createFrame(-2, 2.5, -4.9);
    const frameCenter = createFrame(0, 2.5, -4.9);
    const frameRight = createFrame(2, 2.5, -4.9);
    scene.add(frameLeft);
    scene.add(frameCenter);
    scene.add(frameRight);

    // テクスチャローダー
    const loader = new THREE.TextureLoader();

    // 真ん中のパネルにphoto1.jpgを貼る
    loader.load('./images/photo1.jpg', (texture) => {
      const panelGeometry = new THREE.PlaneGeometry(0.9, 0.9);
      const panelMaterial = new THREE.MeshStandardMaterial({ map: texture });
      const panel = new THREE.Mesh(panelGeometry, panelMaterial);
      panel.position.set(0, 2.5, -4.85); // 額縁の前に少し出す（Z軸方向）
      scene.add(panel);
    });

    // 右のパネルにphoto2.jpgを貼る
    loader.load('./images/photo2.jpg', (texture) => {
      const panelGeometry = new THREE.PlaneGeometry(0.9, 0.9);
      const panelMaterial = new THREE.MeshStandardMaterial({ map: texture });
      const panel = new THREE.Mesh(panelGeometry, panelMaterial);
      panel.position.set(2, 2.5, -4.85);
      scene.add(panel);
    });

    // カメラ基準のライト位置オフセット
    const lightOffset = new THREE.Vector3(0, 10, 7.5);

    function animate() {
      requestAnimationFrame(animate);
      controls.update();

      // ライトの位置更新（カメラ基準）
      const lightPos = lightOffset.clone();
      camera.localToWorld(lightPos);
      light.position.copy(lightPos);

      // ライトターゲットは注視点へ
      light.target.position.copy(controls.target);

      renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

  </script>
</body>
</html>
