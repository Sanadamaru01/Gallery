<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>3Dギャラリー</title>
  <style>
    body { margin: 0; overflow: hidden; }
    canvas { display: block; }
  </style>
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.175.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.175.0/examples/jsm/"
      }
    }
  </script>
</head>
<body>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ギャラリーサイズ
const GALLERY_WIDTH = 10;
const GALLERY_DEPTH = 10;
const GALLERY_HEIGHT = 5;
const ivory = 0xfdf6e3;

// 壁ごとの画像ファイル（順番: front, back, left, right）
const imageFiles = [
  'photo1.jpg', 'photo2.jpg', 'photo3.jpg', 'photo4.jpg',
  'photo5.jpg', 'photo6.jpg', 'photo7.jpg', 'photo8.jpg'
];

const scene = new THREE.Scene();
scene.background = new THREE.Color(ivory);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 2.5, 1);
camera.lookAt(0, 2.5, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.outputEncoding = THREE.sRGBEncoding;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.enableZoom = false;
controls.dampingFactor = 0.1;
controls.rotateSpeed = 0.1;
controls.minPolarAngle = Math.PI / 2;
controls.maxPolarAngle = Math.PI / 2;
controls.target.set(0, 2.5, 0);

// --------------------------------------
// 壁・床・天井
// --------------------------------------
const floor = new THREE.Mesh(
  new THREE.PlaneGeometry(GALLERY_WIDTH, GALLERY_DEPTH),
  new THREE.MeshStandardMaterial({ color: ivory })
);
floor.rotation.x = -Math.PI / 2;
scene.add(floor);

const wallMaterial = new THREE.MeshStandardMaterial({ color: ivory });

function createWall(width, height, position, rotation) {
  const wall = new THREE.Mesh(
    new THREE.PlaneGeometry(width, height),
    wallMaterial
  );
  wall.position.set(...position);
  if (rotation) wall.rotation.y = rotation;
  scene.add(wall);
}

createWall(GALLERY_WIDTH, GALLERY_HEIGHT, [0, GALLERY_HEIGHT / 2, -GALLERY_DEPTH / 2], 0);             // Back
createWall(GALLERY_WIDTH, GALLERY_HEIGHT, [0, GALLERY_HEIGHT / 2, GALLERY_DEPTH / 2], Math.PI);        // Front
createWall(GALLERY_DEPTH, GALLERY_HEIGHT, [-GALLERY_WIDTH / 2, GALLERY_HEIGHT / 2, 0], Math.PI / 2);   // Left
createWall(GALLERY_DEPTH, GALLERY_HEIGHT, [GALLERY_WIDTH / 2, GALLERY_HEIGHT / 2, 0], -Math.PI / 2);   // Right

const ceiling = new THREE.Mesh(
  new THREE.PlaneGeometry(GALLERY_WIDTH, GALLERY_DEPTH),
  wallMaterial
);
ceiling.rotation.x = Math.PI / 2;
ceiling.position.y = GALLERY_HEIGHT;
scene.add(ceiling);

// --------------------------------------
// 光源
// --------------------------------------
const light = new THREE.DirectionalLight(0xffffff, 1.2);
scene.add(light);
scene.add(light.target);

const ambientLight = new THREE.AmbientLight(0x888888, 0.5);
scene.add(ambientLight);

// --------------------------------------
// 画像読み込み＆配置
// --------------------------------------
const loader = new THREE.TextureLoader();
const fixedLongSide = 3;
let imageIndex = 0;

function createWallImages(count, totalLength, baseY, z, rotationY, isHorizontal) {
  const space = totalLength / count;

  for (let i = 0; i < count; i++) {
    if (imageIndex >= imageFiles.length) break;

    const filename = imageFiles[imageIndex++];
    loader.load('./images/' + filename, (texture) => {
      texture.encoding = THREE.sRGBEncoding;
      const iw = texture.image.width;
      const ih = texture.image.height;
      const aspect = ih / iw;
      let frameWidth, frameHeight;
      if (iw >= ih) {
        frameWidth = fixedLongSide;
        frameHeight = fixedLongSide * aspect;
      } else {
        frameHeight = fixedLongSide;
        frameWidth = fixedLongSide / aspect;
      }

      const x = isHorizontal ? -totalLength / 2 + space * (i + 0.5) : z;
      const zPos = isHorizontal ? z : -totalLength / 2 + space * (i + 0.5);

      const frame = new THREE.Mesh(
        new THREE.BoxGeometry(frameWidth, frameHeight, 0.05),
        new THREE.MeshStandardMaterial({ color: 0x333333 })
      );
      frame.position.set(x, baseY, zPos);
      if (rotationY) frame.rotation.y = rotationY;
      scene.add(frame);

      const panel = new THREE.Mesh(
        new THREE.PlaneGeometry(frameWidth * 0.95, frameHeight * 0.95),
        new THREE.MeshBasicMaterial({ map: texture, side: THREE.DoubleSide })
      );
      panel.position.set(x, baseY, zPos + 0.03 * Math.cos(rotationY || 0));
      if (rotationY) panel.rotation.y = rotationY;
      scene.add(panel);
    });
  }
}

// 各壁に配置（画像枚数 = 幅/3 の整数）
const imagesPerWall = Math.floor(GALLERY_WIDTH / 3);
const imagesPerSide = Math.floor(GALLERY_DEPTH / 3);
const centerY = GALLERY_HEIGHT / 2;

// front
createWallImages(imagesPerWall, GALLERY_WIDTH, centerY, GALLERY_DEPTH / 2 - 0.05, Math.PI, true);
// back
createWallImages(imagesPerWall, GALLERY_WIDTH, centerY, -GALLERY_DEPTH / 2 + 0.05, 0, true);
// left
createWallImages(imagesPerSide, GALLERY_DEPTH, centerY, 0, Math.PI / 2, false);
// right
createWallImages(imagesPerSide, GALLERY_DEPTH, centerY, 0, -Math.PI / 2, false);

// --------------------------------------
// カメラ移動（床クリックでターゲット＆カメラ位置変更）
// --------------------------------------
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
let moveStart = null;
let moveFrom = new THREE.Vector3();
let moveTo = new THREE.Vector3();
const moveDuration = 0.6;

let isClick = false;
let clickStartTime = 0;
const floorLimitX = GALLERY_WIDTH / 2 - 1;
const floorLimitZ = GALLERY_DEPTH / 2 - 1;

window.addEventListener('mousedown', () => {
  isClick = true;
  clickStartTime = performance.now();
});

window.addEventListener('mousemove', () => {
  if (performance.now() - clickStartTime > 200) isClick = false;
});

window.addEventListener('mouseup', (event) => {
  if (!isClick) return;

  mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);

  const intersects = raycaster.intersectObject(floor);
  if (intersects.length > 0) {
    const clicked = intersects[0].point;
    if (Math.abs(clicked.x) > floorLimitX || Math.abs(clicked.z) > floorLimitZ) return;

    const currentY = controls.target.y;
    const lookAtPos = new THREE.Vector3(clicked.x, currentY, clicked.z);
    controls.target.copy(lookAtPos);

    const direction = new THREE.Vector3().subVectors(lookAtPos, camera.position).normalize();
    const newCamPos = lookAtPos.clone().addScaledVector(direction, -1);
    newCamPos.y = camera.position.y;

    moveStart = performance.now() / 1000;
    moveFrom.copy(camera.position);
    moveTo.copy(newCamPos);
  }
});

// --------------------------------------
// アニメーション
// --------------------------------------
const lightOffset = new THREE.Vector3(0, 10, 7.5);
function animate() {
  requestAnimationFrame(animate);
  controls.update();

  if (moveStart !== null) {
    const now = performance.now() / 1000;
    const elapsed = now - moveStart;
    const t = Math.min(elapsed / moveDuration, 1);
    camera.position.lerpVectors(moveFrom, moveTo, t);
    camera.lookAt(controls.target);
    if (t >= 1) moveStart = null;
  }

  const lightPos = lightOffset.clone();
  camera.localToWorld(lightPos);
  light.position.copy(lightPos);
  light.target.position.copy(controls.target);

  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
