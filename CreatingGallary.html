<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>3Dギャラリー</title>
  <style>
    body { margin: 0; overflow: hidden; }
    canvas { display: block; }
  </style>
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.175.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.175.0/examples/jsm/"
      }
    }
  </script>
</head>
<body>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const GALLERY_WIDTH = 10;
const GALLERY_HEIGHT = 2.5;
const ivory = 0xfdf6e3;
const scene = new THREE.Scene();
scene.background = new THREE.Color(ivory);

// カメラとコントロール
const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, GALLERY_HEIGHT, 1);
camera.lookAt(0, GALLERY_HEIGHT, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.outputEncoding = THREE.sRGBEncoding;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.enableZoom = false;
controls.dampingFactor = 0.1;
controls.rotateSpeed = 0.1;
controls.minPolarAngle = Math.PI / 2;
controls.maxPolarAngle = Math.PI / 2;
controls.target.set(0, GALLERY_HEIGHT, 0);

// ライティング
const light = new THREE.DirectionalLight(0xffffff, 1.2);
const ambientLight = new THREE.AmbientLight(0x888888, 0.5);
scene.add(light, light.target, ambientLight);

// 床・壁・天井
const floor = new THREE.Mesh(
  new THREE.PlaneGeometry(GALLERY_WIDTH, GALLERY_WIDTH),
  new THREE.MeshStandardMaterial({ color: ivory })
);
floor.rotation.x = -Math.PI / 2;
scene.add(floor);

function createWall(width, height, x, y, z, rotationY = 0) {
  const wall = new THREE.Mesh(
    new THREE.PlaneGeometry(width, height),
    new THREE.MeshStandardMaterial({ color: ivory })
  );
  wall.position.set(x, y, z);
  wall.rotation.y = rotationY;
  scene.add(wall);
}
createWall(GALLERY_WIDTH, GALLERY_HEIGHT * 2, 0, GALLERY_HEIGHT, -GALLERY_WIDTH / 2); // back
createWall(GALLERY_WIDTH, GALLERY_HEIGHT * 2, 0, GALLERY_HEIGHT, GALLERY_WIDTH / 2, Math.PI); // front
createWall(GALLERY_WIDTH, GALLERY_HEIGHT * 2, -GALLERY_WIDTH / 2, GALLERY_HEIGHT, 0, Math.PI / 2); // left
createWall(GALLERY_WIDTH, GALLERY_HEIGHT * 2, GALLERY_WIDTH / 2, GALLERY_HEIGHT, 0, -Math.PI / 2); // right

const ceiling = new THREE.Mesh(
  new THREE.PlaneGeometry(GALLERY_WIDTH, GALLERY_WIDTH),
  new THREE.MeshStandardMaterial({ color: ivory })
);
ceiling.rotation.x = Math.PI / 2;
ceiling.position.y = GALLERY_HEIGHT * 2;
scene.add(ceiling);

// ドア
const doorWidth = 1;
const doorHeight = 2;
const doorThickness = 0.1;
let doorOpen = false;

const doorMaterial = new THREE.MeshBasicMaterial({ color: 0x8B4513 });
const door = new THREE.Mesh(
  new THREE.BoxGeometry(doorWidth, doorHeight, doorThickness),
  doorMaterial
);
door.position.set(0, doorHeight / 2, -GALLERY_WIDTH / 2 + doorThickness / 2);
scene.add(door);

// EXIT テキスト
const canvas = document.createElement('canvas');
canvas.width = 256;
canvas.height = 128;
const ctx = canvas.getContext('2d');
ctx.fillStyle = '#8B4513';
ctx.fillRect(0, 0, canvas.width, canvas.height);
ctx.fillStyle = '#ffffff';
ctx.font = 'bold 48px sans-serif';
ctx.textAlign = 'center';
ctx.textBaseline = 'middle';
ctx.fillText('EXIT', canvas.width / 2, canvas.height / 2);
const exitTexture = new THREE.CanvasTexture(canvas);
exitTexture.encoding = THREE.sRGBEncoding;

const exitLabel = new THREE.Mesh(
  new THREE.PlaneGeometry(doorWidth * 0.8, doorHeight * 0.2),
  new THREE.MeshBasicMaterial({ map: exitTexture, transparent: true })
);
exitLabel.position.set(0, doorHeight * 0.7, door.position.z + 0.06);
scene.add(exitLabel);

// ドアクリックイベント
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
window.addEventListener('click', (event) => {
  mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);
  const intersects = raycaster.intersectObject(door);
  if (intersects.length > 0) {
    doorOpen = !doorOpen;
    const angle = doorOpen ? Math.PI / 2 : 0;
    door.rotation.y = angle;
    exitLabel.rotation.y = angle;
    door.position.x = doorOpen ? -doorWidth / 2 : 0;
    exitLabel.position.x = door.position.x;
  }
});

// ------------------ 写真配置 ------------------
const imageFiles = [
  'photo1.jpg',
  'photo2.jpg',
  // 追加可
];

const loader = new THREE.TextureLoader();

function createFrameWithImage(x, y, z, imagePath) {
  loader.load(imagePath, (texture) => {
    texture.encoding = THREE.sRGBEncoding;
    const imgWidth = texture.image.width;
    const imgHeight = texture.image.height;
    const aspect = imgHeight / imgWidth;
    const fixedLongSide = 3;

    let frameWidth, frameHeight;
    if (imgWidth >= imgHeight) {
      frameWidth = fixedLongSide;
      frameHeight = fixedLongSide * aspect;
    } else {
      frameHeight = fixedLongSide;
      frameWidth = fixedLongSide / aspect;
    }

    const frame = new THREE.Mesh(
      new THREE.BoxGeometry(frameWidth, frameHeight, 0.05),
      new THREE.MeshStandardMaterial({ color: 0x333333 })
    );
    frame.position.set(x, y, z);
    scene.add(frame);

    const panel = new THREE.Mesh(
      new THREE.PlaneGeometry(frameWidth * 0.95, frameHeight * 0.95),
      new THREE.MeshBasicMaterial({ map: texture, side: THREE.DoubleSide })
    );
    panel.position.set(x, y, z + 0.03);
    scene.add(panel);
  });
}

const count = imageFiles.length;
const spacePerImage = GALLERY_WIDTH / count;
imageFiles.forEach((filename, index) => {
  const x = -GALLERY_WIDTH / 2 + spacePerImage * (index + 0.5);
  const z = -GALLERY_WIDTH / 2 + 0.1;
  createFrameWithImage(x, GALLERY_HEIGHT, z, './images/' + filename);
});

// アニメーション
const lightOffset = new THREE.Vector3(0, 10, 7.5);
function animate() {
  requestAnimationFrame(animate);
  controls.update();

  const lightPos = lightOffset.clone();
  camera.localToWorld(lightPos);
  light.position.copy(lightPos);
  light.target.position.copy(controls.target);

  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
