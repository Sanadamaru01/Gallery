<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>3Dギャラリー</title>
  <style>
    body { margin: 0; overflow: hidden; }
    canvas { display: block; }
  </style>
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.175.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.175.0/examples/jsm/"
      }
    }
  </script>
</head>
<body>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// 定数定義
const WALL_WIDTH = 10;
const WALL_HEIGHT = 5;
const GALLERY_HEIGHT = 2.5;
const IMAGE_PATHS = [
  'photo1.jpg', 'photo2.jpg', 'photo3.jpg', 'photo4.jpg',
  'photo5.jpg', 'photo6.jpg', 'photo7.jpg', 'photo8.jpg'
];

const scene = new THREE.Scene();
scene.background = new THREE.Color(0xfdf6e3);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 2.5, 1);
camera.lookAt(0, 2.5, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.outputEncoding = THREE.sRGBEncoding;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.enableZoom = false;
controls.dampingFactor = 0.1;
controls.rotateSpeed = 0.1;
controls.minPolarAngle = Math.PI / 2;
controls.maxPolarAngle = Math.PI / 2;
controls.target.set(0, 2.5, 0);

// 壁と床の色
const ivory = 0xfdf6e3;

// 床
const floor = new THREE.Mesh(
  new THREE.PlaneGeometry(WALL_WIDTH, WALL_WIDTH),
  new THREE.MeshStandardMaterial({ color: ivory })
);
floor.rotation.x = -Math.PI / 2;
scene.add(floor);

// 天井
const ceiling = new THREE.Mesh(
  new THREE.PlaneGeometry(WALL_WIDTH, WALL_WIDTH),
  new THREE.MeshStandardMaterial({ color: ivory })
);
ceiling.rotation.x = Math.PI / 2;
ceiling.position.y = WALL_HEIGHT;
scene.add(ceiling);

// 正面（Z = -WALL_WIDTH/2）※写真を貼る
const frontWall = new THREE.Mesh(
  new THREE.PlaneGeometry(WALL_WIDTH, WALL_HEIGHT),
  new THREE.MeshStandardMaterial({ color: ivory })
);
frontWall.position.set(0, WALL_HEIGHT / 2, -WALL_WIDTH / 2);
scene.add(frontWall);

// 背面（Z = +WALL_WIDTH/2）※貼らない
const backWall = frontWall.clone();
backWall.position.set(0, WALL_HEIGHT / 2, WALL_WIDTH / 2);
backWall.rotation.y = Math.PI;
scene.add(backWall);

// 左壁（X = -WALL_WIDTH/2）※写真を貼る
const leftWall = frontWall.clone();
leftWall.rotation.y = Math.PI / 2;
leftWall.position.set(-WALL_WIDTH / 2, WALL_HEIGHT / 2, 0);
scene.add(leftWall);

// 右壁（X = +WALL_WIDTH/2）※写真を貼る
const rightWall = frontWall.clone();
rightWall.rotation.y = -Math.PI / 2;
rightWall.position.set(WALL_WIDTH / 2, WALL_HEIGHT / 2, 0);
scene.add(rightWall);

// 光源
const light = new THREE.DirectionalLight(0xffffff, 1.2);
scene.add(light);
scene.add(light.target);

const ambientLight = new THREE.AmbientLight(0x888888, 0.5);
scene.add(ambientLight);

// 画像貼付処理
const loader = new THREE.TextureLoader();

function createFramedImage(x, y, z, imagePath, rotationY = 0) {
  loader.load(imagePath, (texture) => {
    texture.encoding = THREE.sRGBEncoding;

    const imgWidth = texture.image.width;
    const imgHeight = texture.image.height;
    const aspect = imgHeight / imgWidth;
    const fixedLongSide = 2.5;

    let frameWidth, frameHeight;
    if (imgWidth >= imgHeight) {
      frameWidth = fixedLongSide;
      frameHeight = fixedLongSide * aspect;
    } else {
      frameHeight = fixedLongSide;
      frameWidth = fixedLongSide / aspect;
    }

    const frame = new THREE.Mesh(
      new THREE.BoxGeometry(frameWidth, frameHeight, 0.05),
      new THREE.MeshStandardMaterial({ color: 0x333333 })
    );
    frame.position.set(x, y, z);
    frame.rotation.y = rotationY;
    scene.add(frame);

    const panel = new THREE.Mesh(
      new THREE.PlaneGeometry(frameWidth * 0.95, frameHeight * 0.95),
      new THREE.MeshBasicMaterial({ map: texture })
    );
    panel.position.set(x, y, z + 0.03 * Math.cos(rotationY));
    panel.rotation.y = rotationY;
    scene.add(panel);
  });
}

// 各壁に貼る画像数を自動計算
const imagesPerWall = Math.ceil(IMAGE_PATHS.length / 3);
let imgIndex = 0;

// 正面壁に画像を均等配置
for (let i = 0; i < imagesPerWall && imgIndex < IMAGE_PATHS.length; i++, imgIndex++) {
  const x = -WALL_WIDTH / 2 + (WALL_WIDTH / (imagesPerWall + 1)) * (i + 1);
  createFramedImage(x, GALLERY_HEIGHT, -WALL_WIDTH / 2 + 0.05, IMAGE_PATHS[imgIndex]);
}

// 左壁
for (let i = 0; i < imagesPerWall && imgIndex < IMAGE_PATHS.length; i++, imgIndex++) {
  const z = -WALL_WIDTH / 2 + (WALL_WIDTH / (imagesPerWall + 1)) * (i + 1);
  createFramedImage(-WALL_WIDTH / 2 + 0.05, GALLERY_HEIGHT, z, IMAGE_PATHS[imgIndex], Math.PI / 2);
}

// 右壁
for (let i = 0; i < imagesPerWall && imgIndex < IMAGE_PATHS.length; i++, imgIndex++) {
  const z = -WALL_WIDTH / 2 + (WALL_WIDTH / (imagesPerWall + 1)) * (i + 1);
  createFramedImage(WALL_WIDTH / 2 - 0.05, GALLERY_HEIGHT, z, IMAGE_PATHS[imgIndex], -Math.PI / 2);
}

// アニメーション
const lightOffset = new THREE.Vector3(0, 10, 7.5);
function animate() {
  requestAnimationFrame(animate);
  controls.update();
  const lightPos = lightOffset.clone();
  camera.localToWorld(lightPos);
  light.position.copy(lightPos);
  light.target.position.copy(controls.target);
  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
